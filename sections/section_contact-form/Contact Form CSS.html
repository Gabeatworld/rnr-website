<style>
/* ============================================
   RNR CONTACT FORM — CUSTOM EMBED STYLES
   Webflow classes handle: .size-5, .label, .button
   ============================================ */
:root {
  --outlines: rgba(216, 215, 213, 0.15);
}
/* --- Layout --- */
.talk__form-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1.25rem;
  position: relative;
  overflow: hidden;
}
.talk__form-sticky {
  align-items: center;
  display: flex;
  width: 100%;
  max-width: 42.5rem;
  position: relative;
  z-index: 2;
}
/* --- WebGL Canvas --- */
.talk__form__blob {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}
/* --- Form --- */
.talk__form {
  align-items: flex-end;
  background-color: rgba(26, 26, 26, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  gap: 0;
  height: 33.75rem;
  max-height: 100%;
  position: relative;
  width: 100%;
}
@media (min-width: 600px) {
  .talk__form { height: 37.5rem; }
}
@media (min-width: 1025px) {
  .talk__form { height: 33.75rem; width: 42.5rem; }
}
/* --- Form Boxes --- */
.talk__form__box {
  display: flex;
  justify-content: flex-end;
  position: relative;
  width: 100%;
}
.talk__form__box:nth-child(2) { flex: 1; }
/* --- Form Lines --- */
.talk__form__line {
  border-left: 1px solid var(--outlines);
  border-right: 1px solid var(--outlines);
  overflow: clip;
  position: relative;
  width: 100%;
}
.talk__form__to { border: 1px solid var(--outlines); }
.talk__form__send { border: 1px solid var(--outlines); }
.talk__form__message { border-top: none; border-bottom: none; }
.talk__form__line-wrapper {
  align-items: center;
  display: flex;
  flex-direction: row;
  flex-shrink: 0;
  justify-content: space-between;
  padding: 1.25rem;
  width: 100%;
}
/* --- TO / SEND rows --- */
.talk__form__to,
.talk__form__send {
  align-items: center;
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  text-transform: uppercase;
}
/* --- Message Area --- */
.talk__form__message {
  height: 100%;
  overflow: clip;
  position: absolute;
}
.talk__form__message__content {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  padding: 1.25rem;
  overflow-y: auto;
  height: 100%;
}
@media (min-width: 1025px) {
  .talk__form__message__content { width: 42.5rem; }
}
/* --- Message Steps --- */
.talk__form__message__wrapper {
  align-items: center;
  display: flex;
  flex-direction: row;
  gap: 0.625rem;
  justify-content: flex-start;
  max-width: 100%;
  opacity: 0;
  padding: 0;
  pointer-events: none;
  transition: opacity 0.35s cubic-bezier(0.45, 0, 0.55, 1);
}
.talk__form__message__wrapper > span {
  max-width: 100%;
  white-space: normal;
  word-wrap: break-word;
}
.talk__form__message__wrapper span:not(.talk__form__message__value):not(.selection) {
  position: relative;
  vertical-align: middle;
}
.talk__form__message__wrapper.show {
  opacity: 0.4;
  pointer-events: all;
}
.talk__form__message.focus .talk__form__message__wrapper.active {
  opacity: 1;
  transition-timing-function: cubic-bezier(0.5, 1, 0.89, 1);
}
.talk__form__message.focus .talk__form__message__wrapper.active span.options {
  pointer-events: all;
}
.talk__form__message.focus .talk__form__message__wrapper.active.valid .tag {
  scale: 1;
  transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
}
.talk__form.ready .talk__form__message .talk__form__message__wrapper.show {
  opacity: 1;
}
/* --- Cursor blink --- */
.talk__form__message__wrapper span.cursor {
  animation: blink 0.65s step-start infinite;
  background-color: currentColor;
  display: inline-flex;
  height: 1.625rem;
  position: absolute;
  translate: 0 15%;
  visibility: hidden;
  width: 1px;
}
.talk__form__message.focus .talk__form__message__wrapper.active span.cursor {
  visibility: visible;
}
@keyframes blink {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}
/* --- Options (pill selectors) --- */
.talk__form__message__wrapper span.options {
  line-height: 1.75;
  pointer-events: none;
  vertical-align: baseline;
}
.talk__form__message__wrapper span.options span {
  background-color: rgba(216, 215, 213, 0.08);
  border-radius: 100vmax;
  cursor: pointer;
  font-size: 0.625rem;
  line-height: 1.6;
  padding: 0.625rem;
  text-transform: uppercase;
  transition: all 0.3s cubic-bezier(0.5, 1, 0.89, 1);
  user-select: none;
  white-space: nowrap;
}
.talk__form__message__wrapper span.options span.active {
  background-color: currentColor;
  color: #000;
}
@media (min-width: 1025px) {
  .talk__form__message__wrapper span.options span:hover {
    background-color: rgba(216, 215, 213, 0.2);
  }
}
/* --- Tag (clickable step advance) --- */
.tag {
  border: 1px solid var(--outlines);
  cursor: pointer;
  display: inline-block;
  font-size: 0.625rem;
  line-height: 1.6;
  padding: 0.625rem;
  text-transform: uppercase;
  scale: 0;
  transform-origin: 0 50%;
  transition: scale 0.25s cubic-bezier(0.36, 0, 0.66, -0.56),
              background-color 0.35s cubic-bezier(0.5, 1, 0.89, 1),
              color 0.35s cubic-bezier(0.5, 1, 0.89, 1);
}
@media (min-width: 1025px) {
  .tag:hover {
    background-color: currentColor;
    color: #000;
  }
}
/* --- Text Inputs --- */
.talk__form__message input[type="text"] {
  background: none;
  border: none;
  outline: none;
  color: inherit;
  font: inherit;
  box-sizing: border-box;
  opacity: 0;
  pointer-events: none;
  position: absolute;
  left: 0;
  top: 0;
  width: 0;
  height: 0;
  overflow: hidden;
}
.talk__form__message input[type="text"][style*="opacity: 1"] {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
}
/* --- Send Button Area --- */
.talk__form__send-wrapper {
  padding-bottom: 0.625rem;
  padding-top: 0.625rem;
}
.talk__form__send__dots {
  display: none;
}
@media (min-width: 600px) {
  .talk__form__send__dots { display: flex; }
}
.talk__form__step-count {
  font-size: 0.625rem;
  text-transform: uppercase;
  opacity: 0.5;
}
.talk__form__send__bt {
  cursor: pointer;
  opacity: 0.2;
  pointer-events: none;
  transition: opacity 0.35s cubic-bezier(0.45, 0, 0.55, 1);
  width: 100%;
}
@media (min-width: 600px) {
  .talk__form__send__bt { width: auto; }
}
.talk__form.ready .talk__form__send__bt {
  opacity: 1;
  pointer-events: all;
}
/* --- Success State --- */
.talk__form__success {
  align-items: flex-start;
  border: 1px solid var(--outlines);
  display: flex;
  flex-direction: column;
  height: 75%;
  justify-content: space-between;
  opacity: 0;
  overflow: clip;
  padding: 1.25rem;
  pointer-events: none;
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
}
/* --- Sending State --- */
.talk__form.sending { pointer-events: none; }
.talk__form.sending * { pointer-events: none !important; }
.talk__form.sending .talk__form__message__content { opacity: 0.5; }
@media (min-width: 1025px) {
  .macgyver { display: none; }
}
</style>
