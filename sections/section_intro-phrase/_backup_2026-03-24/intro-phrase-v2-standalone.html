<style>
    .intro-phrase-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1a1a1a;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }
    .intro-phrase__text {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.3em;
        color: #f5f5f0;
    }
    .intro-phrase__word {
        display: inline-block;
        white-space: pre;
    }
    /* Hide feed + nav until intro reveals them */
    html.has-intro .feed-bg-sticky {
        opacity: 0;
    }
    html.has-intro .feed-wrapper {
        opacity: 0;
        transform: translateY(8px);
    }
    html.has-intro .nav_logo,
    html.has-intro .nav_link {
        opacity: 0;
        transform: translateY(8px);
    }
</style>

<script>
    (function () {
        /* ── 1. Build overlay ── */
        var overlay = document.createElement("div");
        overlay.className = "intro-phrase-overlay intro-overlay";
        var textEl = document.createElement("span");
        textEl.className = "intro-phrase__text size-5";
        overlay.appendChild(textEl);
        document.body.appendChild(overlay);

        /* ── 2. Pick phrase ── */
        var newPhrases = [
            "We build for the bold.",
            "Where culture meets craft.",
            "Your vision. Our obsession.",
            "This is where it starts.",
            "Made for those who move culture.",
            "Not for everyone. For you.",
        ];
        var returnPhrases = [
            "Back for more? Good.",
            "Let's make something again.",
            "Missed you. Let's go.",
            "You know the vibe.",
            "Ready when you are.",
            "Welcome back. Let's work.",
        ];
        var isReturn = !!sessionStorage.getItem("rnr-intro-seen");
        var phrases = isReturn ? returnPhrases : newPhrases;
        var lastPhrase = sessionStorage.getItem("rnr-last-phrase");
        var available = phrases.filter(function (p) { return p !== lastPhrase; });
        var phrase =
            available[Math.floor(Math.random() * available.length)] ||
            phrases[0];
        sessionStorage.setItem("rnr-last-phrase", phrase);
        if (!isReturn) sessionStorage.setItem("rnr-intro-seen", "1");

        /* ── 3. Timing ── */
        var WORD_STAGGER = 220;
        var BLUR_START = 14;
        var BLUR_DURATION = 600;
        var START_DELAY = 400;
        var HOLD_AFTER = 800;

        /* ── 4. Feed intro staging config ── */
        var FEED_INTRO = {
            overlayFade: 0.6,       // overlay dissolve duration
            sliderDelay: 0.3,       // delay before slider starts (overlaps overlay fade)
            sliderDuration: 0.6,    // slider fade-in duration
            contentDelay: 0.15,     // delay after slider starts before content
            contentDuration: 0.5,   // content + nav fade-in duration
            contentStagger: 0.06,   // stagger between content elements
            textDelay: 0.1,         // delay after content before SplitText words
            ease: "power2.out",
        };

        /* ── 5. Build words ── */
        var words = phrase.split(" ");
        var wordEls = [];
        words.forEach(function (word) {
            var span = document.createElement("span");
            span.className = "intro-phrase__word";
            span.textContent = word;
            span.style.opacity = "0";
            span.style.filter = "blur(" + BLUR_START + "px)";
            span.style.transform = "translateY(4px)";
            textEl.appendChild(span);
            wordEls.push(span);
        });

        function revealWord(el) {
            el.style.opacity = "1";
            el.style.transition =
                "opacity 0.3s ease-out, filter " +
                BLUR_DURATION +
                "ms ease-out, transform " +
                BLUR_DURATION +
                "ms ease-out";
            requestAnimationFrame(function () {
                el.style.filter = "blur(0px)";
                el.style.transform = "translateY(0)";
            });
        }

        /* ── 6. Play phrase, then staged reveal ── */
        setTimeout(function () {
            wordEls.forEach(function (el, i) {
                setTimeout(function () { revealWord(el); }, i * WORD_STAGGER);
            });

            var totalDuration =
                (wordEls.length - 1) * WORD_STAGGER +
                BLUR_DURATION +
                HOLD_AFTER;

            setTimeout(function () {
                if (typeof gsap === "undefined") return;

                var section = document.querySelector(".feed-section");
                var feedWrapper = section && section.querySelector(".feed-wrapper");
                var firstProject = section && section.querySelector(".feed-project");
                var _navLogo = document.querySelector(".nav_logo");
                var _navLinks = document.querySelectorAll(".nav_link");
                var bgSticky = section && section.querySelector(".feed-bg-sticky");
                var firstBg = bgSticky && bgSticky.querySelector(".feed-background");

                // ── A. Make page-wrapper visible immediately ──
                // Skip the CSS blur transition so bg is fully opaque under overlay
                var pw = document.querySelector(".page-wrapper");
                if (pw) {
                    pw.style.transition = "none";
                    pw.style.opacity = "1";
                    pw.style.filter = "none";
                    pw.offsetHeight; // force reflow
                    pw.style.transition = "";
                }

                // ── B. Pin inline styles BEFORE removing has-intro ──
                // These elements stay hidden until the staged timeline reveals them
                if (feedWrapper) gsap.set(feedWrapper, { opacity: 0, y: 8 });
                if (_navLogo) gsap.set(_navLogo, { opacity: 0, y: 8 });
                if (_navLinks.length) gsap.set(_navLinks, { opacity: 0, y: 8 });

                // ── C. Show bg at full opacity (still hidden under dark overlay) ──
                if (bgSticky) gsap.set(bgSticky, { opacity: 1 });
                if (firstBg) gsap.set(firstBg, { opacity: 1 });

                // ── D. Remove has-intro, activate first project ──
                document.documentElement.classList.add("hero-ready");
                document.documentElement.classList.remove("has-intro");
                document.body.classList.add("page-entering");
                if (firstProject) firstProject.classList.add("is-active");

                // ── E. Signal other scripts ──
                window.__rnrIntroDone = true;
                window.dispatchEvent(new CustomEvent("rnr:intro-done"));

                // ── F. Crossfade: dissolve dark overlay → colorful bg underneath ──
                overlay.style.transition = "opacity " + FEED_INTRO.overlayFade + "s ease-in-out";
                overlay.style.opacity = "0";
                overlay.addEventListener("transitionend", function () {
                    overlay.remove();
                });

                // ── G. Staged reveal (starts partway through overlay crossfade) ──
                var tl = gsap.timeline({
                    delay: FEED_INTRO.sliderDelay,
                    defaults: { ease: FEED_INTRO.ease }
                });

                // Step 1: Feed wrapper (all projects together)
                if (feedWrapper) {
                    tl.to(feedWrapper, {
                        opacity: 1,
                        y: 0,
                        duration: FEED_INTRO.sliderDuration,
                    }, 0);
                }

                // Step 2: Nav
                var navTargets = [_navLogo].filter(Boolean);
                if (_navLinks.length) {
                    navTargets.push.apply(navTargets, Array.from(_navLinks));
                }
                if (navTargets.length) {
                    tl.to(navTargets, {
                        opacity: 1,
                        y: 0,
                        duration: FEED_INTRO.contentDuration,
                        stagger: FEED_INTRO.contentStagger,
                    }, FEED_INTRO.contentDelay);
                }

                // Step 3: Animate SplitText words (owned by PortfolioAnimation)
                tl.call(function () {
                    if (window.portfolioAnimation && window.portfolioAnimation.animateTextIn) {
                        window.portfolioAnimation.animateTextIn(0);
                    }
                }, null, FEED_INTRO.contentDelay + FEED_INTRO.textDelay);

                // Cleanup
                tl.call(function () {
                    var allEls = [bgSticky, feedWrapper, _navLogo];
                    if (_navLinks.length) allEls.push.apply(allEls, Array.from(_navLinks));
                    allEls.forEach(function (el) {
                        if (el) gsap.set(el, { clearProps: "filter,willChange,transform,y" });
                    });
                    if (typeof ScrollTrigger !== "undefined") ScrollTrigger.refresh();
                });
            }, totalDuration);
        }, START_DELAY);
    })();
</script>
