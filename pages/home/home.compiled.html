<style>

/* ── feed-styles.css ── */
/* ============================================================
   Module: Feed Styles
   Structural CSS for the feed section — sticky backgrounds,
   active-state visibility, and responsive overrides.
   ============================================================ */

/* ── Section ─────────────────────────────────────────────── */
.feed-section {
  position: relative;
}

/* ── Sticky background container ─────────────────────────── */
.feed-bg-sticky {
  position: sticky;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: 0;
  pointer-events: none;
  margin-top: -50vh;
  margin-bottom: -50vh;
}

.feed-bg-sticky .feed-background {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
}

.feed-bg-sticky .feed-background-content {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
}

.feed-bg-sticky .feed-background-image {
  width: 100%;
  height: 130%;
  object-fit: cover;
  position: absolute;
  top: -15%;
  left: 0;
  will-change: transform;
}

/* ── Feed titles — only active project visible ───────────── */
.feed-project .feed-info {
  transition: visibility 0s 0.05s;
}

.feed-project:not(.is-active) .feed-info {
  opacity: 0 !important;
  visibility: hidden !important;
  pointer-events: none !important;
}

.feed-project.is-active .feed-info {
  visibility: visible !important;
}

/* ── Mobile / tablet overrides ───────────────────────────── */
@media (max-width: 1200px) {
  .feed-project {
    flex-direction: column;
    align-items: center;
    padding: 0px 0px 160px;
  }

  .feed-project-slider {
    width: 100%;
    height: auto !important;
  }

  .feed-info {
    align-items: center !important;
    text-align: center !important;
    flex-direction: column;
    position: relative !important;
    top: 0px;
  }
}

@media (max-width: 991px) {
  .feed-project {
    flex-direction: column;
  }
}

/* ── awards-footer-pin.css ── */
/* ── Awards → Footer Crossfade Pin ── */

.awards-footer-pin {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background-color: #f5f0ec;
}

.awards-footer-pin > .awards_section,
.awards-footer-pin > .section_footer-pin {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  min-height: 0 !important;
  overflow: hidden !important;
  display: flex !important;
  flex-direction: column !important;
  justify-content: center !important;
  align-items: center !important;
  box-sizing: border-box !important;
  padding: 0 !important;
  margin: 0 !important;
}

.awards-footer-pin > .section_footer-pin {
  background-color: transparent !important;
  color: #f5f0ec !important;
  z-index: 1;
}

.awards-footer-pin > .awards_section {
  background-color: #f5f0ec !important;
  z-index: 2;
}

.awards-footer-pin > .awards_section > .g_section_space {
  display: none !important;
}

.awards-footer-pin .circle-image {
  visibility: hidden;
}
</style>

<script>

/* ── core ── */
/* ============================================================
   RNR Home — Module Orchestrator
   ============================================================
   Single DOMContentLoaded. Queries DOM once. Passes shared
   context to every registered module in order.
   ============================================================ */

(function () {
  'use strict';

  const RNR = (window.RNR = window.RNR || {});
  RNR.version = '0a622f0';

  // ── Module registry ──────────────────────────────────────
  const _modules = [];

  RNR.register = function (name, initFn, priority) {
    _modules.push({ name, initFn, priority: priority || 0 });
  };

  // ── Boot ─────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Shared DOM refs — queried once, used everywhere
    const container = document.querySelector('.feed-section');
    const wrapper   = document.querySelector('.feed-wrapper');
    const projects  = wrapper
      ? Array.from(wrapper.querySelectorAll('.feed-project'))
      : [];

    const shared = {
      container,
      wrapper,
      projects,
      activeIndex: -1,

      // Shared setters so modules stay in sync
      setActiveIndex(i) { shared.activeIndex = i; },
      getActiveIndex()  { return shared.activeIndex; },
    };

    // Sort by priority (lower runs first) then init in order
    _modules.sort((a, b) => a.priority - b.priority);

    _modules.forEach((mod) => {
      try {
        const api = mod.initFn(shared);
        if (api) RNR[mod.name] = api;
      } catch (err) {
        console.error(`[RNR] Module "${mod.name}" failed to init:`, err);
      }
    });

    console.log(
      `[RNR] v${RNR.version} — ${_modules.length} module(s):`,
      _modules.map((m) => m.name).join(', ')
    );
  });
})();


/* ── feed-animation.js ── */
/* ============================================================
   Module: feedAnimation
   Scroll-triggered text blur reveals + background crossfade
   for feed projects.
   ============================================================ */

RNR.register('feedAnimation', function (shared) {
  const { container, wrapper, projects } = shared;

  if (!container || !wrapper || !projects.length || !window.gsap || !window.SplitText) {
    console.warn('[feedAnimation] Missing required elements or libraries');
    return null;
  }

  gsap.registerPlugin(ScrollTrigger, SplitText);

  // ── Config ───────────────────────────────────────────────
  const isMobile = window.innerWidth <= 768;
  const TEXT = {
    duration:  1.1,
    stagger:   0.2,
    blurStart: isMobile ? 0 : 10,
    delay:     0.05,
    ease:      'power2.out',
  };

  // ── State ────────────────────────────────────────────────
  const splitInstances = [];
  const textElements   = [];

  // ── Backgrounds ──────────────────────────────────────────
  // Move .feed-background from each project into .feed-bg-sticky
  // (fixes GSAP transform + position:fixed conflict)
  var stickyContainer = container.querySelector('.feed-bg-sticky');
  var backgrounds     = [];

  projects.forEach(function (slide, i) {
    var bg = slide.querySelector('.feed-background');
    if (!bg || !stickyContainer) return;
    bg.dataset.bgIndex = i;
    stickyContainer.appendChild(bg);
    backgrounds.push(bg);
  });

  // Start hidden — intro or scroll will reveal
  if (stickyContainer) gsap.set(stickyContainer, { opacity: 0 });
  backgrounds.forEach(function (bg) { gsap.set(bg, { opacity: 0 }); });

  // ── Background crossfade ─────────────────────────────────
  function showBg(index) {
    if (!stickyContainer) return;
    // Sticky container visible
    gsap.to(stickyContainer, { opacity: 1, duration: 0.3, overwrite: true });
    // Incoming fades in — sits on top of outgoing, no gap
    if (backgrounds[index]) {
      gsap.killTweensOf(backgrounds[index]);
      gsap.to(backgrounds[index], {
        opacity: 1, duration: 0.6, ease: 'power1.inOut'
      });
    }
  }

  function hideBg(index) {
    if (backgrounds[index]) {
      gsap.killTweensOf(backgrounds[index]);
      // Delay long enough that incoming is fully opaque before outgoing fades
      gsap.to(backgrounds[index], {
        opacity: 0, duration: 0.6, delay: 0.6, ease: 'power1.in'
      });
    }
  }

  function hideAllBgs() {
    backgrounds.forEach(function (bg) {
      gsap.killTweensOf(bg);
      gsap.set(bg, { opacity: 0 });
    });
    if (stickyContainer) gsap.set(stickyContainer, { opacity: 0 });
  }

  // ── Parallax (desktop only — scrubbed STs are expensive on mobile) ──
  function createParallax() {
    if (window.innerWidth <= 768) return;
    projects.forEach(function (slide, i) {
      var bg = backgrounds[i];
      if (!bg) return;
      var bgImage = bg.querySelector('.feed-background-image');
      if (!bgImage) return;
      gsap.fromTo(bgImage,
        { yPercent: -10 },
        {
          yPercent: 10, ease: 'none',
          scrollTrigger: { trigger: slide, start: 'top bottom', end: 'bottom top', scrub: true }
        }
      );
    });
  }

  // ── Setup: split text once ───────────────────────────────
  projects.forEach((slide) => {
    const title       = slide.querySelector('.feed-title');
    const category    = slide.querySelector('.feed-category');
    const description = slide.querySelector('.feed-project-description');
    const words       = [];

    [title, category, description].forEach((el) => {
      if (!el || !el.textContent.trim()) return;
      const split = new SplitText(el, { type: 'words', wordsClass: 'word' });
      splitInstances.push(split);
      words.push(...split.words);
    });

    textElements.push({ words });

    if (words.length) {
      gsap.set(words, {
        opacity: 0,
        filter: TEXT.blurStart ? `blur(${TEXT.blurStart}px)` : 'none',
        willChange: TEXT.blurStart ? 'transform, opacity, filter' : 'transform, opacity',
      });
    }
  });

  // ── Text animations ──────────────────────────────────────
  function animateIn(index) {
    const { words } = textElements[index];
    if (!words.length) return;

    gsap.killTweensOf(words);
    gsap.set(words, { opacity: 0, filter: `blur(${TEXT.blurStart}px)` });
    gsap.to(words, {
      opacity: 1,
      filter: 'blur(0px)',
      duration: TEXT.duration,
      delay: TEXT.delay,
      stagger: { amount: TEXT.stagger },
      ease: TEXT.ease,
      onComplete() {
        gsap.set(this.targets(), { clearProps: 'willChange,filter' });
      },
    });
  }

  function animateOut(index) {
    const { words } = textElements[index];
    if (!words.length) return;

    gsap.killTweensOf(words);
    gsap.to(words, {
      opacity: 0,
      filter: `blur(${TEXT.blurStart}px)`,
      duration: 0.3,
      stagger: 0.02,
      ease: 'power2.in',
    });
  }

  function hideAll() {
    textElements.forEach(({ words }) => {
      if (!words.length) return;
      gsap.killTweensOf(words);
      gsap.set(words, { opacity: 0, filter: `blur(${TEXT.blurStart}px)` });
    });
    projects.forEach((s) => s.classList.remove('is-active'));
    hideAllBgs();
    shared.setActiveIndex(-1);
  }

  // ── Activate slide ───────────────────────────────────────
  function activateSlide(index) {
    // During intro, block ScrollTrigger-driven activations — intro handles the reveal
    if (document.documentElement.classList.contains('has-intro')) return;

    const prev = shared.getActiveIndex();
    if (prev === index) return;

    if (prev >= 0) {
      projects[prev].classList.remove('is-active');
      animateOut(prev);
      hideBg(prev);
    }

    shared.setActiveIndex(index);
    projects[index].classList.add('is-active');
    animateIn(index);
    showBg(index);

    // Tell slider to restart (direct call, no MutationObserver needed)
    if (RNR.feedSlider) {
      RNR.feedSlider.restartSlider(projects[index]);
    }
  }

  // ── Intro: crossfade first bg as overlay dissolves ───────
  // rnr:intro-done fires right before the overlay starts fading.
  // Set first bg + sticky container to full opacity immediately
  // so the bg is revealed as the dark overlay dissolves.
  if (document.documentElement.classList.contains('has-intro')) {
    var introHandler = function () {
      if (stickyContainer) gsap.set(stickyContainer, { opacity: 1 });
      if (backgrounds[0])  gsap.set(backgrounds[0],  { opacity: 1 });
    };
    if (window.__rnrIntroDone) {
      introHandler();
    } else {
      window.addEventListener('rnr:intro-done', introHandler, { once: true });
    }
  }

  // ── ScrollTriggers ───────────────────────────────────────
  var createTriggers = function () {
    var lastIndex = projects.length - 1;

    projects.forEach(function (slide, i) {
      ScrollTrigger.create({
        trigger: slide,
        start: 'top center',
        end: i === lastIndex ? 'bottom 25%' : 'bottom center',
        onEnter:     function () { activateSlide(i); },
        onEnterBack: function () { activateSlide(i); },
      });
    });

    ScrollTrigger.create({
      trigger: container,
      start: 'top bottom',
      end: 'bottom top',
      onLeave:     function () { hideAll(); },
      onLeaveBack: function () { hideAll(); },
    });

    createParallax();
  };

  // On homepage: wait for intro to finish before creating scroll triggers
  if (document.documentElement.classList.contains('has-intro')) {
    var startTriggers = function () {
      // Don't pre-set activeIndex — let activateSlide(0) from the intro
      // script run the full activation (text + bg + is-active class)
      createTriggers();
    };
    if (window.__rnrIntroDone) {
      startTriggers();
    } else {
      window.addEventListener('rnr:intro-done', startTriggers, { once: true });
    }
  } else {
    // Non-homepage: fade bg-sticky in on scroll
    if (stickyContainer) {
      ScrollTrigger.create({
        trigger: container,
        start: 'top 85%',
        end: 'top 20%',
        scrub: true,
        onUpdate: function (self) {
          gsap.set(stickyContainer, { opacity: self.progress });
        },
      });
    }
    createTriggers();
  }

  // ── Public API ───────────────────────────────────────────
  return { activateSlide, hideAll };

}, 0); // priority 0 — runs first


/* ── feed-slider.js ── */
/* ============================================================
   Module: feedSlider
   Inner slide navigation, dot nav, video control.
   ============================================================ */

RNR.register('feedSlider', function (shared) {
  const { wrapper, projects } = shared;

  if (!wrapper || !projects.length || !window.gsap) {
    console.warn('[feedSlider] Missing required elements or GSAP');
    return null;
  }

  // ── Helpers ──────────────────────────────────────────────
  function getSlideItems(project) {
    const list = project.querySelector('.feed-inner-slider-list');
    if (!list) return [];
    return Array.from(list.querySelectorAll('.feed-slider-slide:not(.w-condition-invisible)'));
  }

  // ── Video control ────────────────────────────────────────
  function playVideo(video) {
    if (!video || video.tagName !== 'VIDEO') return;
    if (video.preload === 'none' && video.readyState === 0) {
      video.preload = 'auto';
      video.load();
    }
    const p = video.play();
    if (p !== undefined) p.catch(() => {});
  }

  function pauseVideo(video) {
    if (!video || video.tagName !== 'VIDEO') return;
    video.pause();
  }

  function playVisibleVideo(project) {
    const idx   = parseInt(project.dataset.innerIndex || '0', 10);
    const items = getSlideItems(project);
    const slide = items[idx];
    if (!slide) return;
    const v = slide.querySelector('video.feed-video');
    if (v) playVideo(v);
  }

  function pauseAllVideos(project) {
    project.querySelectorAll('video.feed-video').forEach((v) => pauseVideo(v));
  }

  function handleSlideVideoTransition(project, fromIdx, toIdx) {
    const items = getSlideItems(project);
    const fromV = items[fromIdx]?.querySelector('video.feed-video');
    const toV   = items[toIdx]?.querySelector('video.feed-video');
    if (fromV) pauseVideo(fromV);
    if (toV)   playVideo(toV);
  }

  // ── Nav visibility ───────────────────────────────────────
  function updateNavVisibility(project, currentIndex, totalItems) {
    const sliderWrapper = project.querySelector('.feed-project-slider');
    if (!sliderWrapper) return;

    const prevZone = sliderWrapper.querySelector('.slide-prev');
    const nextZone = sliderWrapper.querySelector('.slide-next');
    const isFirst  = currentIndex === 0;
    const isLast   = currentIndex === totalItems - 1;

    if (prevZone) prevZone.style.display = (isFirst || isLast) ? 'none' : 'block';
    if (nextZone) nextZone.style.display = isLast ? 'none' : 'block';

    if (nextZone && !isLast) {
      if (isFirst) {
        nextZone.style.left  = '0';
        nextZone.style.width = '100%';
      } else {
        nextZone.style.left  = '';
        nextZone.style.width = '';
      }
    }
  }

  // ── Setup per project ────────────────────────────────────
  projects.forEach((project, i) => {
    project.dataset.index      = i;
    project.dataset.innerIndex = 0;

    const sliderWrapper = project.querySelector('.feed-project-slider');
    const sliderList    = project.querySelector('.feed-inner-slider-list');
    if (!sliderList) return;

    const slideItems = sliderList.querySelectorAll('.feed-slider-slide:not(.w-condition-invisible)');
    if (slideItems.length <= 1) return;

    // Dots
    const dotsNav = project.querySelector('.feed-inner-slider-nav');
    if (dotsNav) {
      const existing = dotsNav.querySelectorAll('.feed-inner-slider-dot');
      for (let d = existing.length; d < slideItems.length; d++) {
        const dot = document.createElement('div');
        dot.className    = 'feed-inner-slider-dot';
        dot.dataset.index = d;
        dotsNav.appendChild(dot);
      }
      const first = dotsNav.querySelector('.feed-inner-slider-dot');
      if (first) first.classList.add('active');
    }

    // Initial nav state
    const prevZone = sliderWrapper?.querySelector('.slide-prev');
    const nextZone = sliderWrapper?.querySelector('.slide-next');
    if (prevZone) prevZone.style.display = 'none';
    if (nextZone) { nextZone.style.left = '0'; nextZone.style.width = '100%'; }
  });

  // ── Navigation ───────────────────────────────────────────
  function navigateInnerSlider(project, direction) {
    const sliderList = project.querySelector('.feed-inner-slider-list');
    if (!sliderList) return;

    const slideItems = getSlideItems(project);
    const dots       = project.querySelectorAll('.feed-inner-slider-dot');
    if (slideItems.length <= 1 || gsap.isTweening(sliderList)) return;

    let current = parseInt(project.dataset.innerIndex || '0', 10);
    let next    = current + direction;

    if (next < 0) next = 0;
    if (next >= slideItems.length) next = slideItems.length - 1;
    if (next === current) return;

    const w = slideItems[0]?.offsetWidth || 0;
    gsap.to(sliderList, { x: -w * next, duration: 0.55, ease: 'power3.inOut' });

    if (dots[current]) dots[current].classList.remove('active');
    if (dots[next])    dots[next].classList.add('active');
    project.dataset.innerIndex = next;

    handleSlideVideoTransition(project, current, next);
    updateNavVisibility(project, next, slideItems.length);
  }

  function navigateToIndex(project, targetIndex) {
    const sliderList = project.querySelector('.feed-inner-slider-list');
    if (!sliderList) return;

    const slideItems = getSlideItems(project);
    const dots       = project.querySelectorAll('.feed-inner-slider-dot');
    if (slideItems.length <= 1 || gsap.isTweening(sliderList)) return;

    const current = parseInt(project.dataset.innerIndex || '0', 10);
    if (targetIndex === current) return;

    const w = slideItems[0]?.offsetWidth || 0;
    gsap.to(sliderList, { x: -w * targetIndex, duration: 0.55, ease: 'power3.inOut' });

    if (dots[current])     dots[current].classList.remove('active');
    if (dots[targetIndex]) dots[targetIndex].classList.add('active');
    project.dataset.innerIndex = targetIndex;

    handleSlideVideoTransition(project, current, targetIndex);
    updateNavVisibility(project, targetIndex, slideItems.length);
  }

  function restartSlider(project) {
    const current = parseInt(project.dataset.innerIndex || '0', 10);
    navigateToIndex(project, 0);
    if (current === 0) playVisibleVideo(project);
  }

  // ── Active project watcher (direct, no MutationObserver) ─
  // feedAnimation calls restartSlider directly via the public API.
  // We still need to handle video play/pause on activation though.
  // Listen for class changes on projects to manage video state.

  function onProjectActivated(project) {
    playVisibleVideo(project);
  }

  function onProjectDeactivated(project) {
    pauseAllVideos(project);
  }

  // Lightweight observer — only for video play/pause
  const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      if (mutation.attributeName !== 'class') return;
      const project = mutation.target;
      const isActive = project.classList.contains('is-active');

      if (isActive) {
        onProjectActivated(project);
      } else {
        onProjectDeactivated(project);
      }
    });
  });

  projects.forEach((project) => {
    observer.observe(project, { attributes: true, attributeFilter: ['class'] });
  });

  // ── Events (delegated) ──────────────────────────────────
  // Hover: preload adjacent slide video
  wrapper.addEventListener('mouseenter', (e) => {
    const nextZone = e.target.closest('.slide-next');
    const prevZone = e.target.closest('.slide-prev');
    if (!nextZone && !prevZone) return;

    const project = e.target.closest('.feed-project');
    if (!project) return;

    const current = parseInt(project.dataset.innerIndex || '0', 10);
    const items   = getSlideItems(project);
    const target  = nextZone ? current + 1 : current - 1;

    if (target >= 0 && target < items.length) {
      const v = items[target]?.querySelector('video.feed-video');
      if (v && v.preload === 'none' && v.readyState === 0) {
        v.preload = 'auto';
        v.load();
      }
    }
  }, true);

  // Click
  wrapper.addEventListener('click', (e) => {
    const project = e.target.closest('.feed-project');
    if (!project) return;

    if (e.target.closest('.slide-restart')) {
      e.preventDefault(); e.stopPropagation();
      restartSlider(project);
      return;
    }
    if (e.target.closest('.slide-next')) {
      e.preventDefault(); e.stopPropagation();
      navigateInnerSlider(project, 1);
      return;
    }
    if (e.target.closest('.slide-prev')) {
      e.preventDefault(); e.stopPropagation();
      navigateInnerSlider(project, -1);
      return;
    }

    const dot = e.target.closest('.feed-inner-slider-dot');
    if (dot) {
      e.preventDefault(); e.stopPropagation();
      navigateToIndex(project, parseInt(dot.dataset.index, 10));
      return;
    }

    const caseSlide = e.target.closest('.feed-view-case');
    const caseLink  = e.target.closest('.feed-view-case a');
    if (caseSlide && !caseLink) {
      e.preventDefault();
      navigateInnerSlider(project, -1);
    }
  });

  // ── Public API ───────────────────────────────────────────
  return { restartSlider, navigateInnerSlider, navigateToIndex };

}, 1); // priority 1 — runs after feedAnimation


/* ── image-trail.js ── */
/* ============================================================
   Module: imageTrail
   Snapshot section — mouse-follow image trail effect.
   Active only while .section_snapshot is in viewport.
   Positions are viewport-relative so scroll can't desync.
   ============================================================ */

RNR.register('imageTrail', function (/* shared */) {
  const section   = document.querySelector('.section_snapshot');
  const container = document.querySelector('.trail_wrap');
  if (!section || !container || !window.gsap) return null;

  // ── Math utils ───────────────────────────────────────────
  const lerp     = (a, b, n) => (1 - n) * a + n * b;
  const distance = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

  // ── Mouse position — viewport-relative to container ──────
  let mousePos     = { x: 0, y: 0 };
  let cacheMousePos = { x: 0, y: 0 };
  let lastMousePos  = { x: 0, y: 0 };

  section.addEventListener('mousemove', (ev) => {
    const rect = container.getBoundingClientRect();
    mousePos = {
      x: ev.clientX - rect.left,
      y: ev.clientY - rect.top,
    };
  });

  // ── Image items ──────────────────────────────────────────
  class ImageItem {
    constructor(el) {
      this.el = el;
      this.width  = el.offsetWidth;
      this.height = el.offsetHeight;
      gsap.set(el, { scale: 0, x: 0, y: 0, opacity: 1 });
      window.addEventListener('resize', () => this.resize());
    }
    resize() {
      gsap.set(this.el, { scale: 0, x: 0, y: 0 });
      this.width  = this.el.offsetWidth;
      this.height = this.el.offsetHeight;
    }
    isActive() {
      return gsap.isTweening(this.el) || this.el.style.transform.indexOf('scale(0)') === -1;
    }
  }

  const images = Array.from(container.querySelectorAll('.trail_scale-img')).map((el) => new ImageItem(el));
  if (images.length === 0) return null;

  let imgPosition = 0;
  let zIndexVal   = 1;
  const threshold = 100;

  // ── Visibility gating (pause when offscreen) ─────────────
  let isVisible = false;
  let rafId     = null;

  const visObserver = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        isVisible = entry.isIntersecting;
        if (isVisible && !rafId) {
          rafId = requestAnimationFrame(render);
        }
      });
    },
    { threshold: 0 }
  );
  visObserver.observe(section);

  // ── Render loop ──────────────────────────────────────────
  function render() {
    if (!isVisible) { rafId = null; return; }

    const dist = distance(mousePos.x, mousePos.y, lastMousePos.x, lastMousePos.y);

    cacheMousePos.x = lerp(cacheMousePos.x || mousePos.x, mousePos.x, 0.1);
    cacheMousePos.y = lerp(cacheMousePos.y || mousePos.y, mousePos.y, 0.1);

    if (dist > threshold) {
      showNextImage();
      zIndexVal++;
      imgPosition = imgPosition < images.length - 1 ? imgPosition + 1 : 0;
      lastMousePos = { ...mousePos };
    }

    // Reset z-index when idle
    let idle = true;
    for (const img of images) {
      if (img.isActive()) { idle = false; break; }
    }
    if (idle && zIndexVal !== 1) zIndexVal = 1;

    rafId = requestAnimationFrame(render);
  }

  function showNextImage() {
    const img = images[imgPosition];
    if (!img) return;

    // Use offsetWidth/Height (layout size, not scroll-dependent)
    const hw = img.width / 2;
    const hh = img.height / 2;

    gsap.killTweensOf(img.el);
    gsap.timeline()
      .set(img.el, {
        scale: 0,
        zIndex: zIndexVal,
        x: cacheMousePos.x - hw,
        y: cacheMousePos.y - hh,
        immediateRender: true,
      })
      .to(img.el, {
        duration: 0.6,
        ease: 'expo.out',
        scale: 1,
        x: mousePos.x - hw,
        y: mousePos.y - hh,
      }, 0)
      .to(img.el, {
        duration: 0.8,
        ease: 'power2.in',
        scale: 0,
      }, 0.5);
  }

  // ── Preload images then start ────────────────────────────
  const preload = () => new Promise((resolve) => {
    if (typeof imagesLoaded !== 'undefined') {
      imagesLoaded(document.querySelectorAll('.trail_scale-img'), resolve);
    } else {
      resolve();
    }
  });

  preload().then(() => {
    if (isVisible && !rafId) {
      rafId = requestAnimationFrame(render);
    }
  });

  return null;

}, 10); // priority 10 — independent, runs last


/* ── service-hover.js ── */
/* ============================================================
   Module: serviceHover
   Service item hover — text color, image scale, BG fade,
   mouse-driven move + rotate on the image wrap.
   Replaces 4 Webflow interactions with one script.
   ============================================================ */

RNR.register('serviceHover', function (/* shared */) {
  // Disable entirely on mobile/tablet — hover interactions don't apply
  if (window.innerWidth <= 768) return null;

  const serviceList = document.querySelector('.service-list');
  if (!serviceList || !window.gsap) return null;

  const items  = Array.from(serviceList.querySelectorAll('.service-item'));
  const bgWrap = document.querySelector('.services-bg');
  const bgImages = bgWrap
    ? Array.from(bgWrap.querySelectorAll('.service-bg-image'))
    : [];

  if (!items.length) return null;

  // ── Config ───────────────────────────────────────────────
  const MOVE_RANGE   = 150;  // px
  const ROTATE_RANGE = 4;    // degrees
  const HOVER_IN     = { duration: 0.3, ease: 'circ.out' };
  const HOVER_OUT    = { duration: 0.3, ease: 'power2.in' };

  // ── State ────────────────────────────────────────────────
  let activeItem  = null;
  let mouseX      = 0;
  let mouseY      = 0;
  let currentX   = 0;
  let currentY   = 0;
  let currentRot = 0;
  let rafId       = null;

  // ── Initial states ───────────────────────────────────────
  items.forEach((item) => {
    const imgWrap = item.querySelector('.image-wrap-service');
    if (imgWrap) {
      gsap.set(imgWrap, { scale: 0, opacity: 0 });
    }
  });

  bgImages.forEach((bg) => {
    gsap.set(bg, { opacity: 0 });
  });

  // ── Mouse tracking loop ──────────────────────────────────
  function trackMouse() {
    if (!activeItem) { rafId = null; return; }

    const imgWrap = activeItem.querySelector('.image-wrap-service');
    if (!imgWrap) { rafId = null; return; }

    const rect = activeItem.getBoundingClientRect();
    // Normalise mouse X within item: -1 to 1
    const nx = ((mouseX - rect.left) / rect.width) * 2 - 1;

    const targetX   = nx * MOVE_RANGE;
    const targetRot = nx * ROTATE_RANGE;

    // Lerp for smoothness
    currentX   += (targetX   - currentX)   * 0.12;
    currentRot += (targetRot - currentRot) * 0.12;

    gsap.set(imgWrap, {
      x: currentX,
      rotation: currentRot,
    });

    rafId = requestAnimationFrame(trackMouse);
  }

  function startTracking() {
    if (!rafId) rafId = requestAnimationFrame(trackMouse);
  }

  function stopTracking() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  // ── Hover in ─────────────────────────────────────────────
  function activate(item, index) {
    if (activeItem === item) return;
    if (activeItem) deactivate();

    activeItem = item;

    // Reset lerp values
    currentX = 0; currentY = 0; currentRot = 0;

    // All hover-in animations — same duration + ease
    gsap.to(serviceList, { color: 'white', ...HOVER_IN });
    item.classList.add('is-active');

    const imgWrap = item.querySelector('.image-wrap-service');
    if (imgWrap) {
      gsap.killTweensOf(imgWrap);
      gsap.to(imgWrap, { scale: 1, opacity: 1, ...HOVER_IN });
    }

    const bg = bgImages[index];
    if (bg) {
      gsap.killTweensOf(bg);
      gsap.to(bg, { opacity: 1, ...HOVER_IN });
    }

    startTracking();
  }

  // ── Hover out ────────────────────────────────────────────
  function deactivate() {
    if (!activeItem) return;

    const item  = activeItem;
    const index = items.indexOf(item);

    stopTracking();
    activeItem = null;

    // All hover-out animations — same duration + ease
    gsap.to(serviceList, { color: 'var(--_theme---text)', ...HOVER_OUT });
    item.classList.remove('is-active');

    const imgWrap = item.querySelector('.image-wrap-service');
    if (imgWrap) {
      gsap.killTweensOf(imgWrap);
      gsap.to(imgWrap, { scale: 0, opacity: 0, x: 0, rotation: 0, ...HOVER_OUT });
    }

    const bg = bgImages[index];
    if (bg) {
      gsap.killTweensOf(bg);
      gsap.to(bg, { opacity: 0, ...HOVER_OUT });
    }
  }

  // ── Events ───────────────────────────────────────────────
  items.forEach((item, i) => {
    item.addEventListener('mouseenter', () => activate(item, i));
    item.addEventListener('mouseleave', () => deactivate());
  });

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  return { activate, deactivate };

}, 5); // priority 5


/* ── awards-footer-pin.js ── */
/* ============================================================
   Module: awardsFooterPin
   Merges .awards_section + .section_footer-pin into one
   seamless pinned crossfade sequence.

   Flow:
     1. Awards scrolls into view normally (text + numeral fire)
     2. Wrapper pins at viewport top
     3. Awards content staggers OUT (logos → numeral → subtext → heading)
     4. BG crossfades cream → dark
     5. Footer heading + CTA fades IN
     6. Circular images bloom + spin starts
     7. Hold for spin viewing → pin releases

   REPLACES the standalone footer-pin embed script.
   ============================================================ */

RNR.register('awardsFooterPin', function (/* shared */) {
  if (!window.gsap || !window.ScrollTrigger) return null;
  gsap.registerPlugin(ScrollTrigger);

  // ── Elements ──────────────────────────────────────────────
  const awards = document.querySelector('.awards_section');
  const footer = document.querySelector('.section_footer-pin');
  if (!awards || !footer) return null;

  const aHeading = awards.querySelector('.awards_heading');
  const aSubtext = awards.querySelector('.awards_main-text');
  const aNumeral = awards.querySelector('.awards_numeral');
  const aLogos   = awards.querySelector('[data-animate="visual"]');

  const fHeading  = footer.querySelector('.footer-pin_heading');
  const fCarousel = footer.querySelector('.master-cta-images');
  const fImages   = gsap.utils.toArray('.circle-image');

  if (!fCarousel || !fImages.length) return null;

  // ── Countup hijack ────────────────────────────────────────
  // Remove data-countup attrs so the standalone embed never fires.
  // We drive the numbers via the scrubbed timeline instead.
  var countupProxies = Array.from(awards.querySelectorAll('[data-countup]')).map(function (el) {
    var attrVal = el.getAttribute('data-countup') || '';
    var rawText  = el.textContent.trim();
    // Attribute may hold the number, or may just be a hook — fall back to textContent
    var numFromAttr = parseFloat(attrVal.replace(/[^0-9.]/g, ''));
    var target = (numFromAttr > 0 ? numFromAttr : parseFloat(rawText.replace(/[^0-9.]/g, ''))) || 0;
    var suffix = rawText.replace(/^[\d,.\s]+/, '');
    el.removeAttribute('data-countup');
    return { el: el, target: target, val: 0, suffix: suffix };
  });

  // ── Kill conflicting ScrollTriggers on awards + footer ─────
  // The global animation system (setupVisualAnimations / setupSplitAnimations)
  // creates STs for [data-animate] elements inside awards. Their toggleActions
  // (reset/reverse) fire when scrolling away and back, overwriting the state
  // this module's timeline depends on — breaking the countup and blur reveal.
  ScrollTrigger.getAll().forEach(function (st) {
    if (!st.trigger) return;
    if (st.trigger === footer || (st.pin && st.pin === footer) ||
        st.trigger === awards || awards.contains(st.trigger)) {
      st.kill();
    }
  });

  // Strip data-animate from the sections THEMSELVES and all children.
  // On first load, .animations-ready may not be set yet — the CSS rule
  // html:not(.animations-ready) [data-animate] { opacity: 0 } would hide
  // the entire section if only children were stripped.
  awards.removeAttribute('data-animate');
  footer.removeAttribute('data-animate');
  awards.querySelectorAll('[data-animate]').forEach(function (el) {
    el.removeAttribute('data-animate');
  });
  footer.querySelectorAll('[data-animate]').forEach(function (el) {
    el.removeAttribute('data-animate');
  });

  // Fix race condition: if the global animation system ran first,
  // setupSplitAnimations() may have split heading/subtext into .word spans
  // with opacity:0. Setting the parent visible doesn't help — the children
  // stay hidden. Clear those word spans so text is readable.
  awards.querySelectorAll('.word, .word-mask').forEach(function (w) {
    gsap.set(w, { opacity: 1, y: 0, filter: 'none', clearProps: 'willChange,force3D' });
  });

  // ── Create wrapper ────────────────────────────────────────
  const wrapper = document.createElement('div');
  wrapper.className = 'awards-footer-pin';
  awards.parentNode.insertBefore(wrapper, awards);
  wrapper.appendChild(awards);
  wrapper.appendChild(footer);

  // ── Initial states ────────────────────────────────────────
  // Force awards section itself visible (overrides any CSS opacity rule)
  gsap.set(awards, { autoAlpha: 1 });
  gsap.set(footer, { autoAlpha: 0 });
  if (fHeading) gsap.set(fHeading, { opacity: 0, y: 40 });
  gsap.set(fImages, { visibility: 'visible', scale: 0, opacity: 0 });
  // Ensure awards children are visible — global data-animate presets may have hidden them
  if (aHeading) gsap.set(aHeading, { opacity: 1, y: 0, filter: 'blur(0px)', clearProps: 'willChange' });
  if (aSubtext) gsap.set(aSubtext, { opacity: 1, y: 0, filter: 'blur(0px)', clearProps: 'willChange' });
  if (aNumeral) gsap.set(aNumeral, { opacity: 1, y: 0, filter: 'blur(0px)', clearProps: 'willChange' });
  if (aLogos)   gsap.set(aLogos,   { opacity: 1, y: 0, filter: 'blur(0px)', clearProps: 'willChange' });

  // ── Carousel positioning ──────────────────────────────────
  var getRadius = function () {
    var w = window.innerWidth;
    if (w < 479) return w * 0.75;
    if (w < 991) return w * 0.5;
    return 600;
  };

  var positionImages = function () {
    var radius = getRadius();
    var step = (Math.PI * 2) / fImages.length;
    fImages.forEach(function (img, i) {
      var angle = i * step;
      gsap.set(img, {
        x: Math.cos(angle) * radius,
        y: Math.sin(angle) * radius,
        xPercent: -50,
        yPercent: -50,
        scale: 0,
        opacity: 0
      });
    });
  };
  positionImages();

  // ── Infinite spin (paused) ────────────────────────────────
  var BASE_SPEED = 0.75;
  var currentDir = 1;
  var spinStarted = false;

  var infiniteSpin = gsap.to(fCarousel, {
    rotation: 360, duration: 60, ease: 'none', repeat: -1, paused: true
  });
  var counterSpin = gsap.to(fImages, {
    rotation: -360, duration: 60, ease: 'none', repeat: -1, paused: true
  });

  var updateSpinSpeed = function (factor) {
    if (Math.abs(factor) < 0.01) return;
    currentDir = factor > 0 ? 1 : -1;
    var target = BASE_SPEED * currentDir + factor;
    target = gsap.utils.clamp(-12, 12, target);
    gsap.to([infiniteSpin, counterSpin], {
      timeScale: target, duration: 0.6, overwrite: true
    });
  };

  var startSpin = function () {
    if (spinStarted) return;
    spinStarted = true;
    infiniteSpin.play();
    counterSpin.play();
  };

  var stopSpin = function () {
    if (!spinStarted) return;
    spinStarted = false;
    infiniteSpin.pause();
    counterSpin.pause();
  };

  // ── Timeline builder ──────────────────────────────────────
  var mainTl = null;

  var buildTimeline = function () {
    // Tear down previous if rebuilding (resize)
    if (mainTl) {
      var st = mainTl.scrollTrigger;
      mainTl.kill();
      if (st) st.kill();
      stopSpin();

      gsap.set(awards, { autoAlpha: 1 });
      gsap.set(footer, { autoAlpha: 0 });
      gsap.set(wrapper, { backgroundColor: '#f5f0ec' });
      if (aHeading)  gsap.set(aHeading,  { opacity: 1, y: 0, filter: 'blur(0px)' });
      if (aSubtext)  gsap.set(aSubtext,  { opacity: 1, y: 0, filter: 'blur(0px)' });
      if (aNumeral)  gsap.set(aNumeral,  { opacity: 1, y: 0, filter: 'blur(0px)' });
      if (aLogos)    gsap.set(aLogos,    { opacity: 1, y: 0, filter: 'blur(0px)' });
      if (fHeading)  gsap.set(fHeading,  { opacity: 0, y: 40 });
      positionImages();
    }

    var isMobile = window.innerWidth <= 768;
    mainTl = gsap.timeline({
      scrollTrigger: {
        trigger: wrapper,
        start: 'top top',
        end: isMobile ? '+=150%' : '+=200%',
        pin: true,
        scrub: isMobile ? 1 : 0.6,
        anticipatePin: isMobile ? 0 : 1,
        invalidateOnRefresh: true,
        onUpdate: function (self) {
          var p = self.progress;
          if (p >= 0.32 && !spinStarted) {
            startSpin();
          } else if (p < 0.30 && spinStarted) {
            stopSpin();
          }
          if (p > 0.38 && spinStarted) {
            var sensitivity = window.innerWidth < 991 ? 400 : 200;
            updateSpinSpeed(self.getVelocity() / sensitivity);
          }
        },
        onLeave: function () {
          gsap.set(wrapper, { backgroundColor: '#1a1a1a' });
          gsap.set(fImages, { scale: 1, opacity: 1 });
        },
        onRefresh: function (self) {
          if (self.spacer) {
            self.spacer.style.backgroundColor = '#f5f0ec';
          }
        }
      }
    });

    var tl = mainTl;

    // PHASE 1: Numeral blur-reveal + countup (0 → 0.12)
    // Numeral materialises through blur while numbers tick up underneath
    if (aNumeral) {
      tl.fromTo(aNumeral,
        { opacity: 0, filter: 'blur(12px)' },
        { opacity: 1, filter: 'blur(0px)', duration: 0.06, ease: 'power2.out' },
        0
      );
    }

    countupProxies.forEach(function (d) {
      tl.fromTo(d, { val: 0 }, {
        val: d.target,
        duration: 0.10,
        ease: 'none',
        onUpdate: (function (data) {
          return function () {
            data.el.textContent = Math.round(data.val) + (data.suffix || '');
          };
        })(d)
      }, 0);
    });

    // PHASE 2: Awards stagger OUT — tightened (0.06 → 0.26)
    if (aLogos) {
      tl.to(aLogos, {
        opacity: 0, y: -20, filter: 'blur(4px)',
        duration: 0.06, ease: 'power2.in'
      }, 0.06);
    }
    if (aSubtext) {
      tl.to(aSubtext, {
        opacity: 0, y: -15, filter: 'blur(4px)',
        duration: 0.06, ease: 'power2.in'
      }, 0.10);
    }
    // Numeral exits after countup completes (0.10)
    if (aNumeral) {
      tl.to(aNumeral, {
        opacity: 0, y: -15, filter: 'blur(4px)',
        duration: 0.06, ease: 'power2.in'
      }, 0.13);
    }
    if (aHeading) {
      tl.to(aHeading, {
        opacity: 0, y: -25, filter: 'blur(8px)',
        duration: 0.07, ease: 'power2.in'
      }, 0.16);
    }

    // PHASE 3: Crossfade BG + awards fade (0.20 → 0.34)
    tl.to(wrapper, {
      backgroundColor: '#1a1a1a',
      duration: 0.14, ease: 'power1.inOut'
    }, 0.20);

    tl.to(awards, { autoAlpha: 0, duration: 0.10, ease: 'power1.in' }, 0.20);

    // PHASE 4 + 5: Footer heading + images bloom together (0.32 → 0.50)
    tl.to(footer, { autoAlpha: 1, duration: 0.04 }, 0.32);

    if (fHeading) {
      tl.to(fHeading, {
        opacity: 1, y: 0,
        duration: 0.12, ease: 'power2.out'
      }, 0.34);
    }

    tl.to(fImages, {
      scale: 1, opacity: 1,
      duration: 0.14,
      ease: 'back.out(1.2)',
      stagger: { each: 0.003, from: 'start' }
    }, 0.32);

    // PHASE 6: Hold for spin viewing (0.50 → 1.0)
    tl.to({}, { duration: 0.50 }, 0.50);
  };

  // ── Boot — wait for carousel images ───────────────────────
  var imgEls = fImages.map(function (el) {
    return el.querySelector('img') || el;
  });
  var pending = imgEls.filter(function (el) {
    return el.tagName === 'IMG' && !el.complete;
  });

  var boot = function () {
    buildTimeline();
    ScrollTrigger.refresh();
  };

  if (pending.length) {
    var loaded = 0;
    var check = function () { if (++loaded >= pending.length) boot(); };
    pending.forEach(function (img) {
      img.addEventListener('load', check, { once: true });
      img.addEventListener('error', check, { once: true });
    });
    setTimeout(function () {
      if (loaded < pending.length) { loaded = pending.length; boot(); }
    }, 3000);
  } else {
    boot();
  }

  // ── Scroll end — ease spin back ───────────────────────────
  ScrollTrigger.addEventListener('scrollEnd', function () {
    if (!spinStarted) return;
    gsap.to([infiniteSpin, counterSpin], {
      timeScale: BASE_SPEED * currentDir,
      duration: 1.5, overwrite: true
    });
  });

  // ── Resize — full rebuild ─────────────────────────────────
  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      positionImages();
      buildTimeline();
    }, 250);
  });

  // Public API
  return {
    rebuild: buildTimeline
  };

}, 10); // priority 10 — runs after feed modules

</script>
